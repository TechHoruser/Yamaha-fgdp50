name: CI

on:
  push:
    branches: [main, "claude/**"]
  pull_request:
    branches: [main]

jobs:
  frontend:
    name: Frontend — typecheck & lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: "11"

      - uses: actions/setup-node@v4
        with:
          node-version: "24"
          cache: pnpm

      - run: pnpm install --frozen-lockfile
      - run: pnpm typecheck
      - run: pnpm lint
      - run: pnpm test

  go-build:
    name: Go — vet & build (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: apps/desktop/go.mod
          cache: true

      - name: Go vet
        working-directory: apps/desktop
        run: go vet ./...

      - name: Go build (verify compilation)
        working-directory: apps/desktop
        run: go build -v ./...

      - name: Go test
        working-directory: apps/desktop
        run: go test ./...

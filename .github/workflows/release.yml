name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  # ── 1. Extract version from branch name ────────────────────────────────────
  prepare:
    name: Prepare
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.ver.outputs.version }}
      prerelease: ${{ steps.ver.outputs.prerelease }}
    steps:
      - id: ver
        name: Extract version from tag
        run: |
          # GITHUB_REF_NAME is already the tag, e.g. v0.0.1
          VERSION="${GITHUB_REF_NAME}"
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          if echo "$VERSION" | grep -Eqi '\-(alpha|beta|rc)'; then
            echo "prerelease=true" >> "$GITHUB_OUTPUT"
          else
            echo "prerelease=false" >> "$GITHUB_OUTPUT"
          fi

  # ── 2. Generate release notes with git-cliff ────────────────────────────────
  changelog:
    name: CHANGELOG
    needs: prepare
    runs-on: ubuntu-latest
    outputs:
      notes: ${{ steps.cliff.outputs.content }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Generate release notes
        id: cliff
        uses: orhun/git-cliff-action@v4
        with:
          args: --unreleased --tag ${{ needs.prepare.outputs.version }} --strip header
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  # ── 3. Build platform binaries ──────────────────────────────────────────────
  build:
    name: Build — ${{ matrix.name }}
    needs: prepare
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          # Windows: NSIS installer (.exe)
          - name: Windows x64
            os: windows-latest
            platform: windows/amd64

          # macOS: universal fat binary (.app → .zip) — works on Intel & Apple Silicon
          - name: macOS Universal
            os: macos-latest
            platform: darwin/universal

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: apps/desktop/go.mod
          cache: true

      - uses: pnpm/action-setup@v4
        with:
          version: '11'

      - uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: pnpm

      - name: Install Wails CLI
        run: go install github.com/wailsapp/wails/v2/cmd/wails@latest

      # Windows: NSIS is not pre-installed on the runner — needed for -nsis flag
      - name: Install NSIS (Windows)
        if: runner.os == 'Windows'
        run: choco install nsis -y --no-progress

      # Windows: add MinGW (CGo) and NSIS (makensis) to PATH explicitly.
      # choco shims alone are not reliable for makensis inside wails build.
      - name: Add MinGW and NSIS to PATH (Windows)
        if: runner.os == 'Windows'
        shell: bash
        run: |
          echo "C:/msys64/mingw64/bin" >> "$GITHUB_PATH"
          echo "C:/Program Files (x86)/NSIS" >> "$GITHUB_PATH"

      # Install all workspace deps from root so pnpm calls inside wails build are no-ops
      - name: Install workspace dependencies
        run: pnpm install --frozen-lockfile

      # ── Windows ──────────────────────────────────────────────────────────
      - name: Build Windows installer
        if: runner.os == 'Windows'
        shell: bash
        working-directory: apps/desktop
        env:
          CGO_ENABLED: 1
          CC: gcc
        run: wails build -platform windows/amd64 -nsis -ldflags "-X main.Version=${{ needs.prepare.outputs.version }}"

      - name: List Windows build output
        if: runner.os == 'Windows'
        shell: bash
        run: ls -la apps/desktop/build/bin/ || echo "build/bin not found"

      - name: Upload Windows installer
        if: runner.os == 'Windows'
        uses: actions/upload-artifact@v4
        with:
          name: windows-installer
          # NSIS produces fgdp-looper-amd64-installer.exe
          path: apps/desktop/build/bin/*-installer.exe
          if-no-files-found: error

      # ── macOS ─────────────────────────────────────────────────────────────
      - name: Build macOS universal app
        if: runner.os == 'macOS'
        working-directory: apps/desktop
        run: wails build -platform darwin/universal -ldflags "-X main.Version=${{ needs.prepare.outputs.version }}"

      - name: Zip macOS app bundle
        if: runner.os == 'macOS'
        shell: bash
        run: |
          cd apps/desktop/build/bin
          APP=$(ls -d *.app | head -1)
          zip -r "fgdp-looper-macos-universal.zip" "$APP"
          echo "Packaged: $APP → fgdp-looper-macos-universal.zip"

      - name: Upload macOS app
        if: runner.os == 'macOS'
        uses: actions/upload-artifact@v4
        with:
          name: macos-app
          path: apps/desktop/build/bin/fgdp-looper-macos-universal.zip
          if-no-files-found: error

  # ── 4. Publish GitHub Release ────────────────────────────────────────────────
  release:
    name: Publish Release
    needs: [prepare, changelog, build]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: dist/
          merge-multiple: true

      - name: Create GitHub Release ${{ needs.prepare.outputs.version }}
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ needs.prepare.outputs.version }}
          name: FGDP Looper ${{ needs.prepare.outputs.version }}
          body: ${{ needs.changelog.outputs.notes }}
          files: dist/**
          draft: false
          prerelease: ${{ needs.prepare.outputs.prerelease == 'true' }}
